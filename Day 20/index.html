<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Style by Css</title>
  <style>

    p:first-child{
      background-color: red;
      color: white;
    }
    div > p {
      background-color: yellow;
      color: black;
    }
  </style>
</head>

<body>

  <div>
    <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Expedita explicabo consectetur dicta fuga ea at vitae
      suscipit, repellendus illum deleniti laboriosam ipsa distinctio.</p>
    <p>I am another para</p>
    <p>I am also another para</p>
    <p>I am another para</p>
    <p>I am also another para</p>

  </div>

</body>

</html>
