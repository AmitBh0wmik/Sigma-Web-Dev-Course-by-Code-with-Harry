<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Object-fit and Object-cover</title>
  <style>
    .card {
      height: 400px;
      width: 700px;
      border: 2px solid red;
    }
   .card img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

  </style>
</head>
<body>
  <div class="card">
    <img width="500px" src="amit.jpg" alt="">
  </div>
</body>
</html>
