<html>

<head>
  <title>html form</title>
</head>

<body>
  <h2>Registation Form</h2>
  <form>


    <div>
      <label for="fullname"> Full Name:</label> <input type="text" name="FullName" id="fullname">
    </div>

    <br>

    <div>
      <label for="mail"> Email</label>
      <input type="email" name="Email" id="mail">
    </div>
    <br>

    <div>
      <label for="password"> Password</label>
      <input type="password" name="Password" id="password">
    </div>
    <br>

    <div>
      <label for="dob"> Date of Birth:</label>
      <input type="date" name="dob" id="dob">
    </div>
    <br>
    <div>
      <label for="photo"> Choose your photo:</label>
      <input type="file" name="photo" id="photo">
    </div>

    <br>
    <div>

      <p>Selec your Gender</p>
      <input type="radio" id="male" name="gender" value="male">
      <label for="male">Male</label>

      <input type="radio" id="female" name="gender" value="female">
      <label for="female">Female</label>

      <br>

      <p>Select you Religion</p>
      <input type="radio" id="hindu" name="religion" value="hindu">
      <label for="hindu">Hindu</label>

      <input type="radio" id="islam" name="religion" value="islam">
      <label for="islam">Islam</label>


      <p>Select you favrate actress </p>
      <input type="checkbox" id="argentian" name="team" value="Argetina">
      <label for="argentian">Argetina</label>

      <input type="checkbox" id="bercelona" name="team" value="Bercelona">
      <label for="bercelona">Bercelona</label>

      <input type="checkbox" id="mancity" name="team" value="Mancity">
      <label for="mancity">Man City </label>

      <input type="checkbox" id="arsenal" name="team" value="Arsenal">
      <label for="arsenal">Arsenal</label>

    </div>

<br>
<div>

<label for="city">Select you city</label>
  <select id="city" name="city">
    <option value="dhaka">Dhaka</option>
    <option value="ctg" selected>Chittagong</option>
    <option value="sylhet">Sylhet</option>
  </select>
</div>

<div>
<h4>Write what you can</h4>
  
<textarea placeholder="Enter your message here..."></textarea>
</div>

<div>
  <input type="submit" value="registar">
  <input type="reset" value="reset">
</div>












  </form>



</body>

</html>
